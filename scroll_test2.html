<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; height: 100dvh; overflow: hidden; }
body {
  font-family: -apple-system, sans-serif;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  background: #f2f2f7;
}
header {
  flex-shrink: 0;
  height: 60px;
  background: #fff;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-weight: 700;
}
.tabs {
  flex-shrink: 0;
  display: flex;
  background: #fff;
  border-bottom: 1px solid #eee;
}
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 13px;
  border: none;
  background: none;
  cursor: pointer;
}
.tab.active { color: #007AFF; border-bottom: 2px solid #007AFF; }
.screen { display: none; flex: 1; flex-direction: column; min-height: 0; }
.screen.active { display: flex; }
.panel { display: none; flex: 1; flex-direction: column; min-height: 0; }
.panel.active { display: flex; }
.scroll-area {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 12px;
}
.card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
}
nav {
  flex-shrink: 0;
  height: 60px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
}
nav button { flex: 1; border: none; background: none; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>
<header>Stock AI Assistant</header>
<div class="screen active" id="s1">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('p1',this)">보유종목</button>
    <button class="tab" onclick="switchTab('p2',this)">설정</button>
  </div>
  <div class="panel active" id="p1">
    <div class="scroll-area">
      <div class="card">종목 1 - 손가락으로 스크롤 테스트</div>
      <div class="card">종목 2</div>
      <div class="card">종목 3</div>
      <div class="card">종목 4</div>
      <div class="card">종목 5</div>
      <div class="card">종목 6</div>
      <div class="card">종목 7</div>
      <div class="card">종목 8</div>
      <div class="card">종목 9</div>
      <div class="card">종목 10</div>
    </div>
  </div>
  <div class="panel" id="p2">
    <div class="scroll-area">
      <div class="card">설정 1</div>
      <div class="card">설정 2</div>
    </div>
  </div>
</div>
<nav>
  <button>내정보</button>
  <button>브리핑</button>
  <button>차트</button>
  <button>발굴</button>
</nav>
<script>
function switchTab(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
