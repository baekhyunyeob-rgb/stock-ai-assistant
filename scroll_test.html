<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  background: #f2f2f7;
}
.header {
  flex-shrink: 0;
  height: 50px;
  background: #007AFF;
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-weight: 700;
}
.content {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.footer {
  flex-shrink: 0;
  height: 60px;
  background: #fff;
  border-top: 1px solid #eee;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: #888;
}
</style>
</head>
<body>
<div class="header">스크롤 테스트</div>
<div class="content">
  <div class="card">항목 1 - 여기를 손가락으로 스크롤해보세요</div>
  <div class="card">항목 2</div>
  <div class="card">항목 3</div>
  <div class="card">항목 4</div>
  <div class="card">항목 5</div>
  <div class="card">항목 6</div>
  <div class="card">항목 7</div>
  <div class="card">항목 8</div>
  <div class="card">항목 9</div>
  <div class="card">항목 10</div>
</div>
<div class="footer">하단 네비게이션</div>
</body>
</html>
